  <style>
    /* ===== SPLASH SCREEN ===== */
    html { background: #0d0e14 !important; }
    body { padding-top: 0; background: transparent; }

    .splash {
      position: fixed;
      inset: 0;
      z-index: 1000;
      background-color: var(--bg);
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    .splash-bg {
      position: absolute;
      inset: 0;
      pointer-events: none;
      overflow: hidden;
    }
    .splash-bg video {
      position: absolute;
      inset: 0;
      width: 100%;
      height: 100%;
      object-fit: cover;
      opacity: 0.35;
    }

    .splash-inner {
      display: flex;
      flex-direction: column;
      align-items: center;
      gap: 28px;
      opacity: 0;
      transform: translateY(40px);
      transition: opacity 1s cubic-bezier(0.4,0,0.2,1), transform 1s cubic-bezier(0.4,0,0.2,1);
      position: relative;
      z-index: 2;
      padding: 0 24px;
    }
    .splash-inner.visible {
      opacity: 1;
      transform: translateY(0);
    }

    .splash-avatar {
      width: 180px;
      height: 180px;
      border-radius: 50%;
      overflow: hidden;
      background: #111;
      border: 3px solid rgba(255,255,255,0.15);
      box-shadow: 0 0 0 1px rgba(255,255,255,0.05), 0 24px 64px rgba(0,0,0,0.7), 0 0 60px rgba(180,30,30,0.25);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
    }
    .splash-avatar img {
      width: 100%;
      height: 100%;
      object-fit: cover;
    }
    .splash-avatar.no-img::after {
      content: 'K';
      font-size: 3.5rem;
      font-weight: 700;
      color: #fff;
    }

    .splash-name {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 2rem;
      font-weight: 800;
      color: #fff;
      letter-spacing: -0.02em;
      text-shadow: 0 2px 4px rgba(0,0,0,1), 0 0 40px rgba(0,0,0,1), 2px 2px 0 rgba(0,0,0,0.8);
      -webkit-text-stroke: 0.3px rgba(255,255,255,0.8);
    }

    .splash-bio {
      font-size: 1rem;
      color: rgba(255,255,255,0.6);
      text-align: center;
      line-height: 1.6;
      margin-top: -12px;
      letter-spacing: 0.01em;
    }

    .splash-socials {
      display: flex;
      gap: 14px;
      align-items: center;
      justify-content: center;
    }
    .splash-socials .social-icon {
      width: 52px;
      height: 52px;
      border-radius: 50%;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .splash-socials .social-icon:hover { transform: translateY(-4px) scale(1.08); }
    .splash-socials .social-icon--discord {
      color: #5865F2;
      background: rgba(88,101,242,0.15);
      border: 1px solid rgba(88,101,242,0.3);
    }
    .splash-socials .social-icon--discord:hover {
      background: rgba(88,101,242,0.28);
      border-color: #5865F2;
      box-shadow: 0 8px 24px rgba(88,101,242,0.4);
    }
    .splash-socials .social-icon--x {
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.15);
    }
    .splash-socials .social-icon--x:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.3);
      box-shadow: 0 8px 24px rgba(255,255,255,0.1);
    }
    .splash-socials .social-icon--yt {
      color: #ff4444;
      background: rgba(255,60,60,0.12);
      border: 1px solid rgba(255,60,60,0.25);
    }
    .splash-socials .social-icon--yt:hover {
      background: rgba(255,60,60,0.22);
      border-color: #ff4444;
      box-shadow: 0 8px 24px rgba(255,60,60,0.35);
    }

    .splash-divider { display: none; }

    .splash-enter {
      display: inline-flex;
      align-items: center;
      gap: 10px;
      font-family: var(--font);
      font-size: 1rem;
      font-weight: 700;
      color: #fff;
      background: rgba(255,255,255,0.1);
      border: 1px solid rgba(255,255,255,0.2);
      border-radius: 50px;
      padding: 16px 48px;
      cursor: pointer;
      transition: all 0.25s cubic-bezier(0.4,0,0.2,1);
      letter-spacing: 0.06em;
      text-decoration: none;
      text-transform: uppercase;
      backdrop-filter: blur(12px);
      -webkit-backdrop-filter: blur(12px);
    }
    .splash-enter:hover {
      background: rgba(255,255,255,0.18);
      border-color: rgba(255,255,255,0.4);
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.4);
    }
    .splash-enter::after { content: '→'; transition: transform 0.2s; }
    .splash-enter:hover::after { transform: translateX(6px); }

    @media (max-width: 768px) {
      .splash-inner { gap: 20px; padding: 0 20px; }
      .splash-avatar {
        width: 130px;
        height: 130px;
      }
      .splash-name { font-size: 1.55rem; }
      .splash-bio { font-size: 0.9rem; }
      .splash-socials { gap: 12px; }
      .splash-socials .social-icon { width: 48px; height: 48px; }
      .splash-enter { padding: 14px 40px; font-size: 0.95rem; }
    }

    @media (max-width: 390px) {
      .splash-avatar { width: 110px; height: 110px; }
      .splash-name { font-size: 1.35rem; }
      .splash-enter { padding: 13px 32px; }
    }
  </style>

  <script>
    // Burger (kept for other pages)
    const burger = document.getElementById('burger');
    const menu = document.getElementById('mobileMenu');
    if (burger) burger.addEventListener('click', () => menu.classList.toggle('open'));

    // Force video autoplay on mobile (iOS/Android)
    const bgVideo = document.querySelector('.splash-bg video');
    if (bgVideo) {
      bgVideo.muted = true;
      bgVideo.playsInline = true;
      const tryPlay = () => bgVideo.play().catch(() => {});
      tryPlay();
      document.addEventListener('touchstart', tryPlay, { once: true });
      document.addEventListener('click', tryPlay, { once: true });
    }

    // Trigger splash animation after tiny delay
    requestAnimationFrame(() => {
      setTimeout(() => {
        document.getElementById('splashInner').classList.add('visible');
      }, 80);
    });
  </script>

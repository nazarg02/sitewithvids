  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #050608;
      font-family: 'Syne', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── VIDEO BACKGROUND ─── */
    .intro-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
    }
    .intro-bg video {
      width: 100%; height: 100%;
      object-fit: cover;
      opacity: 0;
      transition: opacity 1.8s ease;
      position: relative;
      z-index: 0;
    }
    /* Hide every variant of iOS/webkit native play-button overlay */
    video::-webkit-media-controls,
    video::-webkit-media-controls-panel,
    video::-webkit-media-controls-overlay-play-button,
    video::-webkit-media-controls-play-button,
    video::-webkit-media-controls-start-playback-button {
      display: none !important;
      opacity: 0 !important;
      -webkit-appearance: none;
    }
    /* Dark overlay sits ABOVE the video, covering any native play UI */
    .intro-bg::after {
      content: '';
      position: absolute;
      inset: 0;
      z-index: 1;
      background: radial-gradient(ellipse 90% 90% at 50% 50%, rgba(5,6,8,0.55) 0%, rgba(5,6,8,0.92) 100%);
      pointer-events: none;
    }

    /* ─── STAGE ─── */
    .intro-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ─── LOGO ─── */
    .intro-logo-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 72px;
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 1.1s cubic-bezier(0.16,1,0.3,1);
    }
    .intro-logo-wrap.show {
      opacity: 1;
      transform: scale(1);
    }
    .intro-logo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.0);
      transition: border-color 1.4s ease, box-shadow 1.4s ease;
      animation: none;
    }
    .intro-logo-ring.glow {
      border-color: rgba(255,255,255,0.18);
      box-shadow: 0 0 40px rgba(255,255,255,0.08), 0 0 80px rgba(255,255,255,0.04), inset 0 0 30px rgba(255,255,255,0.03);
      animation: ring-pulse 3s ease-in-out infinite 0.5s;
    }
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(255,255,255,0.07), 0 0 70px rgba(255,255,255,0.03); border-color: rgba(255,255,255,0.15); }
      50%       { box-shadow: 0 0 55px rgba(255,255,255,0.14), 0 0 110px rgba(255,255,255,0.06); border-color: rgba(255,255,255,0.28); }
    }

    /* ─── ORBIT TRACK (4 quarter dots) ─── */
    .intro-ring-2 { display: none; }
    .intro-ring-3 { display: none; }

    .orbit-track {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      border: 1px solid rgba(255,255,255,0.05);
      opacity: 0;
      transition: opacity 1.2s ease 0.9s;
      animation: ring-spin 10s linear infinite;
    }
    .intro-logo-wrap.show .orbit-track { opacity: 1; }
    @keyframes ring-spin { to { transform: rotate(360deg); } }

    .orbit-dot {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .orbit-dot-q1 { top: -3px;           left: calc(50% - 3px); background: #5566ff; box-shadow: 0 0 8px #5566ff; }
    .orbit-dot-q2 { right: -3px;         top:  calc(50% - 3px); background: #63b3ed; box-shadow: 0 0 8px #63b3ed; }
    .orbit-dot-q3 { bottom: -3px;        left: calc(50% - 3px); background: #48c78e; box-shadow: 0 0 8px #48c78e; }
    .orbit-dot-q4 { left: -3px;          top:  calc(50% - 3px); background: #f6ad55; box-shadow: 0 0 8px #f6ad55; }

    /* ─── DQT SESSION BOXES ─── */
    .qt-cycle-wrap {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.16,1,0.3,1);
      margin-top: -4px;
      margin-bottom: 44px;
    }
    .qt-cycle-wrap.show { opacity: 1; transform: translateY(0); }

    /* Each box fades in staggered then all fade out together */
    .qt-box {
      opacity: 0;
      transform-box: fill-box;
      transform-origin: bottom center;
    }
    .qt-box-1 { animation: qt-box-in 5s ease infinite 0s;    }
    .qt-box-2 { animation: qt-box-in 5s ease infinite 0.45s; }
    .qt-box-3 { animation: qt-box-in 5s ease infinite 0.9s;  }
    .qt-box-4 { animation: qt-box-in 5s ease infinite 1.35s; }
    @keyframes qt-box-in {
      0%        { opacity: 0; transform: scaleY(0.4); }
      10%       { opacity: 1; transform: scaleY(1);   }
      65%       { opacity: 1; transform: scaleY(1);   }
      85%, 100% { opacity: 0; transform: scaleY(1);   }
    }

    .qt-candle { opacity: 0; }
    .qt-wick   { opacity: 0; }
    .qt-box-1 ~ .qt-candle-1, .qt-box-1 ~ .qt-wick-1 { animation: qt-box-in 5s ease infinite 0.2s; }
    .qt-candle-1 { animation: qt-box-in 5s ease infinite 0.2s !important; }
    .qt-candle-2 { animation: qt-box-in 5s ease infinite 0.65s !important; }
    .qt-candle-3 { animation: qt-box-in 5s ease infinite 1.1s !important; }
    .qt-candle-4 { animation: qt-box-in 5s ease infinite 1.55s !important; }
    .qt-wick-1   { animation: qt-box-in 5s ease infinite 0.2s !important; }
    .qt-wick-2   { animation: qt-box-in 5s ease infinite 0.65s !important; }
    .qt-wick-3   { animation: qt-box-in 5s ease infinite 1.1s !important; }
    .qt-wick-4   { animation: qt-box-in 5s ease infinite 1.55s !important; }

    .qt-label { opacity: 0; animation: qt-label-in 5s ease infinite; }
    .qt-label-1 { animation-delay: 0.25s; }
    .qt-label-2 { animation-delay: 0.7s;  }
    .qt-label-3 { animation-delay: 1.15s; }
    .qt-label-4 { animation-delay: 1.6s;  }
    @keyframes qt-label-in {
      0%        { opacity: 0; }
      12%       { opacity: 1; }
      65%       { opacity: 1; }
      85%, 100% { opacity: 0; }
    }
    .intro-logo-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid rgba(255,255,255,0.12);
      box-shadow: 0 8px 40px rgba(0,0,0,0.7);
    }

    /* ─── TEXT ─── */
    .intro-name {
      display: flex;
      gap: 0;
      overflow: hidden;
      margin-bottom: 14px;
      max-width: 100vw;
      padding: 0 12px;
      box-sizing: border-box;
    }
    .intro-name .char {
      font-size: clamp(1.35rem, 6.5vw, 2.8rem);
      font-weight: 800;
      color: #fff;
      letter-spacing: clamp(0.02em, 0.5vw, 0.08em);
      text-transform: uppercase;
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .intro-name .char.space { width: 0.4em; }
    .intro-name .char.show {
      opacity: 1;
      transform: translateY(0);
    }

    .intro-tagline {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      font-weight: 500;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.38);
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      margin-bottom: 60px;
    }
    .intro-tagline.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── PROGRESS BAR ─── */
    .intro-progress {
      position: fixed;
      bottom: 0; left: 0;
      height: 1px;
      width: 0%;
      background: linear-gradient(90deg, transparent, rgba(255,255,255,0.6), rgba(255,255,255,0.9), rgba(255,255,255,0.6), transparent);
      box-shadow: 0 0 8px rgba(255,255,255,0.4);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .intro-progress.active { opacity: 1; }

    /* ─── NAME SHIMMER ─── */
    .intro-name.shimmer .char {
      background: linear-gradient(90deg, #fff 0%, #fff 40%, rgba(255,255,255,0.55) 50%, #fff 60%, #fff 100%);
      background-size: 200% auto;
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      animation: name-shimmer 2.2s ease forwards;
    }
    @keyframes name-shimmer {
      0%   { background-position: 100% center; }
      100% { background-position: -100% center; }
    }

    /* ─── SKIP BUTTON ─── */
    .intro-skip {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 20;
      font-family: 'Syne', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.3);
      background: none;
      border: 1px solid rgba(255,255,255,0.1);
      border-radius: 20px;
      padding: 7px 16px;
      cursor: pointer;
      opacity: 0;
      transition: opacity 0.5s ease, color 0.2s, border-color 0.2s;
    }
    .intro-skip.show { opacity: 1; }
    .intro-skip:hover { color: rgba(255,255,255,0.7); border-color: rgba(255,255,255,0.25); }

    /* ─── CINEMATIC LINES ─── */
    .cin-line {
      position: fixed;
      left: 0; right: 0;
      height: 80px;
      background: #050608;
      z-index: 5;
      transition: transform 1.2s cubic-bezier(0.76,0,0.24,1);
    }
    .cin-line-top { top: 0; transform: translateY(0); }
    .cin-line-bot { bottom: 0; transform: translateY(0); }
    .cin-line-top.open { transform: translateY(-100%); }
    .cin-line-bot.open { transform: translateY(100%); }

    /* ─── FADE OUT OVERLAY ─── */
    .intro-fade {
      position: fixed;
      inset: 0;
      background: #050608;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .intro-fade.out { opacity: 1; }

    @media (max-width: 480px) {
      .intro-logo-wrap  { width: 100px; height: 100px; margin-bottom: 60px; }
      .intro-logo-img   { width: 100px; height: 100px; }
      .orbit-track      { inset: -26px; }
      .cin-line         { height: 60px; }
      .intro-name .char { font-size: clamp(0.9rem, 5.2vw, 1.4rem); letter-spacing: 0.05em; }
      .intro-tagline    { margin-bottom: 28px; font-size: 0.7rem; }
      .qt-cycle-wrap    { margin-bottom: 24px; }
      .qt-cycle-wrap svg { width: 170px; height: 72px; }
    }

    /* ─── MOBILE: no video, dark gradient background ─── */
    @media (max-width: 768px) {
      #introBgVideo { display: none; }
      .intro-bg {
        background: radial-gradient(ellipse 100% 70% at 50% 20%, #0d1128 0%, #07080f 50%, #050608 100%);
      }
      .intro-bg::after { display: none; }
    }
  </style>
</head>
<body>

  <!-- cinematic bars -->
  <div class="cin-line cin-line-top" id="cinTop"></div>
  <div class="cin-line cin-line-bot" id="cinBot"></div>

  <!-- video bg -->
  <div class="intro-bg" id="introBg">
    <video autoplay loop muted playsinline webkit-playsinline preload="auto"
           disablepictureinpicture disableremoteplayback
           x-webkit-airplay="deny" id="introBgVideo">
      <source src="videos/mainbackground.mp4" type="video/mp4">
    </video>
  </div>

  <!-- main stage -->
  <div class="intro-stage">
    <div class="intro-logo-wrap" id="introLogo">
      <div class="intro-logo-ring" id="logoRing"></div>
      <div class="orbit-track">
        <div class="orbit-dot orbit-dot-q1"></div>
        <div class="orbit-dot orbit-dot-q2"></div>
        <div class="orbit-dot orbit-dot-q3"></div>
        <div class="orbit-dot orbit-dot-q4"></div>
      </div>
      <img class="intro-logo-img" src="images/logo.png" alt="Kenpachi Trades"
           onerror="this.src='images/avatar.png'" />
    </div>

    <div class="intro-name" id="introName"></div>

    <div class="intro-tagline" id="introTagline">Quarterly Theory Education</div>

    <div class="qt-cycle-wrap" id="qtCycleWrap">
      <svg width="216" height="92" viewBox="0 0 216 92" fill="none" xmlns="http://www.w3.org/2000/svg">

        <!-- Q1 Asia — blue/indigo — tight range (accumulation) -->
        <rect class="qt-box qt-box-1" x="2" y="22" width="50" height="52" rx="3"
              fill="rgba(85,102,255,0.1)" stroke="rgba(85,102,255,0.45)" stroke-width="1"/>
        <line class="qt-wick qt-wick-1" x1="27" y1="26" x2="27" y2="30"   stroke="rgba(85,102,255,0.7)" stroke-width="1.2"/>
        <rect class="qt-candle qt-candle-1" x="22" y="30" width="10" height="22" rx="1.5" fill="rgba(85,102,255,0.65)"/>
        <line class="qt-wick qt-wick-1" x1="27" y1="52" x2="27" y2="68"   stroke="rgba(85,102,255,0.7)" stroke-width="1.2"/>
        <text class="qt-label qt-label-1" x="27" y="86" fill="#5566ff" fill-opacity="0.8" font-size="7.5" text-anchor="middle" font-family="'Syne',sans-serif" font-weight="700" letter-spacing="0.1em">Q1</text>

        <!-- Q2 London — cyan — spike up (manipulation) -->
        <rect class="qt-box qt-box-2" x="56" y="4" width="50" height="70" rx="3"
              fill="rgba(99,179,237,0.1)" stroke="rgba(99,179,237,0.45)" stroke-width="1"/>
        <line class="qt-wick qt-wick-2" x1="81" y1="8"  x2="81" y2="18"  stroke="rgba(99,179,237,0.7)" stroke-width="1.2"/>
        <rect class="qt-candle qt-candle-2" x="76" y="18" width="10" height="32" rx="1.5" fill="rgba(99,179,237,0.65)"/>
        <line class="qt-wick qt-wick-2" x1="81" y1="50" x2="81" y2="68"  stroke="rgba(99,179,237,0.7)" stroke-width="1.2"/>
        <text class="qt-label qt-label-2" x="81" y="86" fill="#63b3ed" fill-opacity="0.8" font-size="7.5" text-anchor="middle" font-family="'Syne',sans-serif" font-weight="700" letter-spacing="0.1em">Q2</text>

        <!-- Q3 NY AM — red — bearish drop (distribution) -->
        <rect class="qt-box qt-box-3" x="110" y="14" width="50" height="62" rx="3"
              fill="rgba(248,90,74,0.1)" stroke="rgba(248,90,74,0.45)" stroke-width="1"/>
        <line class="qt-wick qt-wick-3" x1="135" y1="18" x2="135" y2="26" stroke="rgba(248,90,74,0.7)" stroke-width="1.2"/>
        <rect class="qt-candle qt-candle-3" x="130" y="26" width="10" height="34" rx="1.5" fill="rgba(248,90,74,0.65)"/>
        <line class="qt-wick qt-wick-3" x1="135" y1="60" x2="135" y2="70" stroke="rgba(248,90,74,0.7)" stroke-width="1.2"/>
        <text class="qt-label qt-label-3" x="135" y="86" fill="#f85a4a" fill-opacity="0.8" font-size="7.5" text-anchor="middle" font-family="'Syne',sans-serif" font-weight="700" letter-spacing="0.1em">Q3</text>

        <!-- Q4 NY PM — gold — continuation -->
        <rect class="qt-box qt-box-4" x="164" y="38" width="50" height="38" rx="3"
              fill="rgba(246,173,85,0.1)" stroke="rgba(246,173,85,0.45)" stroke-width="1"/>
        <line class="qt-wick qt-wick-4" x1="189" y1="42" x2="189" y2="46" stroke="rgba(246,173,85,0.7)" stroke-width="1.2"/>
        <rect class="qt-candle qt-candle-4" x="184" y="46" width="10" height="18" rx="1.5" fill="rgba(246,173,85,0.65)"/>
        <line class="qt-wick qt-wick-4" x1="189" y1="64" x2="189" y2="70" stroke="rgba(246,173,85,0.7)" stroke-width="1.2"/>
        <text class="qt-label qt-label-4" x="189" y="86" fill="#f6ad55" fill-opacity="0.8" font-size="7.5" text-anchor="middle" font-family="'Syne',sans-serif" font-weight="700" letter-spacing="0.1em">Q4</text>

      </svg>
    </div>
  </div>

  <!-- progress bar -->
  <div class="intro-progress" id="introProgress"></div>

  <!-- skip -->
  <button class="intro-skip" id="introSkip">Skip →</button>

  <!-- fade overlay -->
  <div class="intro-fade" id="introFade"></div>

  <script>
    const DEST = 'qt-education.html';
    const TOTAL_MS = 4200;

    const logo     = document.getElementById('introLogo');
    const ring     = document.getElementById('logoRing');
    const nameEl   = document.getElementById('introName');
    const tagline  = document.getElementById('introTagline');
    const qtCycle  = document.getElementById('qtCycleWrap');
    const prog     = document.getElementById('introProgress');
    const skip     = document.getElementById('introSkip');
    const fade     = document.getElementById('introFade');
    const cinTop   = document.getElementById('cinTop');
    const cinBot   = document.getElementById('cinBot');
    const bgVideo  = document.getElementById('introBgVideo');
    const bgWrap   = document.getElementById('introBg');

    // iOS autoplay: must set these as properties AND attributes
    bgVideo.muted = true;
    bgVideo.defaultMuted = true;
    bgVideo.playsInline = true;
    bgVideo.setAttribute('muted', '');
    bgVideo.setAttribute('playsinline', '');
    bgVideo.controls = false;

    const tryPlay = () => {
      const p = bgVideo.play();
      if (p && p.catch) p.catch(() => {});
    };

    // Try immediately, on data ready, and on first touch/click
    tryPlay();
    bgVideo.addEventListener('loadeddata', tryPlay, { once: true });
    bgVideo.addEventListener('canplay',    tryPlay, { once: true });
    document.addEventListener('touchstart', tryPlay, { once: true, passive: true });
    document.addEventListener('click',      tryPlay, { once: true });

    function navigate() {
      fade.classList.add('out');
      setTimeout(() => { window.location.href = DEST; }, 820);
    }

    skip.addEventListener('click', navigate);

    // ── SEQUENCE ──────────────────────────────────────────────
    const name = 'Kenpachi Trades';

    // Build letter spans
    [...name].forEach(ch => {
      const s = document.createElement('span');
      s.className = 'char' + (ch === ' ' ? ' space' : '');
      s.textContent = ch === ' ' ? ' ' : ch;
      nameEl.appendChild(s);
    });

    const chars = nameEl.querySelectorAll('.char');
    let progTimer = null;
    let startTime = null;

    function animateProgress() {
      startTime = Date.now();
      prog.classList.add('active');
      function tick() {
        const elapsed = Date.now() - startTime;
        const pct = Math.min(elapsed / TOTAL_MS * 100, 100);
        prog.style.width = pct + '%';
        if (pct < 100) progTimer = requestAnimationFrame(tick);
      }
      progTimer = requestAnimationFrame(tick);
    }

    setTimeout(() => {
      // Open cinematic bars
      cinTop.classList.add('open');
      cinBot.classList.add('open');

      // Fade video in
      bgWrap.querySelector('video').style.opacity = '0.3';
    }, 100);

    setTimeout(() => {
      // Logo appears
      logo.classList.add('show');
    }, 400);

    setTimeout(() => {
      // Ring glow
      ring.classList.add('glow');
    }, 900);

    setTimeout(() => {
      // Letters animate in staggered
      chars.forEach((c, i) => {
        setTimeout(() => c.classList.add('show'), i * 52);
      });
    }, 1200);

    setTimeout(() => {
      // Shimmer sweep across name
      nameEl.classList.add('shimmer');
    }, 1200 + chars.length * 52 + 100);

    setTimeout(() => {
      // Tagline + QT spiral
      tagline.classList.add('show');
      setTimeout(() => qtCycle.classList.add('show'), 300);
      // Show skip
      skip.classList.add('show');
      // Start progress
      animateProgress();
    }, 2000);

    setTimeout(navigate, TOTAL_MS + 200);
  </script>
</body>
</html>

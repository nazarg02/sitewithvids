  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      width: 100%; height: 100%;
      background: #ffffff;
      font-family: 'Instrument Sans', sans-serif;
      overflow: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── LIGHT BACKGROUND ─── */
    .intro-bg {
      position: fixed;
      inset: 0;
      z-index: 0;
      background:
        radial-gradient(ellipse 70% 55% at 50% 8%, rgba(98,116,242,0.10) 0%, transparent 65%),
        radial-gradient(ellipse 60% 50% at 12% 95%, rgba(98,116,242,0.07) 0%, transparent 60%),
        radial-gradient(ellipse 60% 50% at 88% 95%, rgba(98,116,242,0.07) 0%, transparent 60%),
        #ffffff;
    }
    .intro-pill {
      position: absolute;
      pointer-events: none;
      user-select: none;
      height: auto;
    }
    .intro-pill-1 { width: 170px; top: 8%;   left: 5%;  transform: rotate(-26deg); filter: drop-shadow(0 18px 28px rgba(46,52,64,0.16)); }
    .intro-pill-2 { width: 160px; top: 9%;   right: 5%; transform: rotate(22deg) scaleX(-1); filter: drop-shadow(0 18px 28px rgba(46,52,64,0.16)); }
    .intro-pill-3 { width: 230px; bottom: 4%; left: -3%;  transform: rotate(12deg);  filter: blur(6px); opacity: 0.4; }
    .intro-pill-4 { width: 220px; bottom: 6%; right: -3%; transform: rotate(-14deg) scaleX(-1); filter: blur(6px); opacity: 0.4; }

    /* ─── STAGE ─── */
    .intro-stage {
      position: fixed;
      inset: 0;
      z-index: 10;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      gap: 0;
    }

    /* ─── LOGO ─── */
    .intro-logo-wrap {
      position: relative;
      width: 130px;
      height: 130px;
      margin-bottom: 72px;
      flex-shrink: 0;
      opacity: 0;
      transform: scale(0.7);
      transition: opacity 0.9s cubic-bezier(0.16,1,0.3,1), transform 1.1s cubic-bezier(0.16,1,0.3,1);
    }
    .intro-logo-wrap.show {
      opacity: 1;
      transform: scale(1);
    }
    .intro-logo-ring {
      position: absolute;
      inset: -10px;
      border-radius: 50%;
      border: 1px solid rgba(98,116,242,0.0);
      transition: border-color 1.4s ease, box-shadow 1.4s ease;
      animation: none;
    }
    .intro-logo-ring.glow {
      border-color: rgba(98,116,242,0.35);
      box-shadow: 0 0 40px rgba(98,116,242,0.18), 0 0 80px rgba(98,116,242,0.08);
      animation: ring-pulse 3s ease-in-out infinite 0.5s;
    }
    @keyframes ring-pulse {
      0%, 100% { box-shadow: 0 0 30px rgba(98,116,242,0.14), 0 0 70px rgba(98,116,242,0.06); border-color: rgba(98,116,242,0.28); }
      50%       { box-shadow: 0 0 55px rgba(98,116,242,0.26), 0 0 110px rgba(98,116,242,0.1); border-color: rgba(98,116,242,0.5); }
    }

    /* ─── ORBIT TRACK (4 quarter dots) ─── */
    .intro-ring-2 { display: none; }
    .intro-ring-3 { display: none; }

    .orbit-track {
      position: absolute;
      inset: -32px;
      border-radius: 50%;
      border: 1px solid rgba(46,52,64,0.08);
      opacity: 0;
      transition: opacity 1.2s ease 0.9s;
      animation: ring-spin 10s linear infinite;
    }
    .intro-logo-wrap.show .orbit-track { opacity: 1; }
    @keyframes ring-spin { to { transform: rotate(360deg); } }

    .orbit-dot {
      position: absolute;
      width: 6px; height: 6px;
      border-radius: 50%;
    }
    .orbit-dot-q1 { top: -3px;           left: calc(50% - 3px); background: #5566ff; box-shadow: 0 0 8px #5566ff; }
    .orbit-dot-q2 { right: -3px;         top:  calc(50% - 3px); background: #63b3ed; box-shadow: 0 0 8px #63b3ed; }
    .orbit-dot-q3 { bottom: -3px;        left: calc(50% - 3px); background: #48c78e; box-shadow: 0 0 8px #48c78e; }
    .orbit-dot-q4 { left: -3px;          top:  calc(50% - 3px); background: #f6ad55; box-shadow: 0 0 8px #f6ad55; }

    /* ─── SPINNER (same as the indicators page 🌀) ─── */
    .qt-cycle-wrap {
      opacity: 0;
      transform: translateY(8px);
      transition: opacity 1s ease, transform 1s cubic-bezier(0.16,1,0.3,1);
      margin-top: -4px;
      margin-bottom: 44px;
    }
    .qt-cycle-wrap.show { opacity: 1; transform: translateY(0); }
    .intro-spinner {
      font-size: 2.4rem;
      line-height: 1;
      display: inline-block;
      animation: intro-spin 2.6s linear infinite;
    }
    @keyframes intro-spin { to { transform: rotate(360deg); } }
    .intro-logo-img {
      width: 130px;
      height: 130px;
      border-radius: 50%;
      object-fit: cover;
      display: block;
      border: 2px solid #eef0f7;
      box-shadow: 0 14px 44px rgba(46,52,64,0.18);
    }

    /* ─── TEXT ─── */
    .intro-name {
      display: flex;
      gap: 0;
      overflow: hidden;
      margin-bottom: 14px;
      max-width: 100vw;
      padding: 0 12px;
      box-sizing: border-box;
    }
    .intro-name .char {
      font-size: clamp(1.9rem, 7vw, 3.4rem);
      font-weight: 700;
      color: #2e3440;
      letter-spacing: -0.03em;
      display: inline-block;
      opacity: 0;
      transform: translateY(30px);
      transition: opacity 0.5s ease, transform 0.6s cubic-bezier(0.16,1,0.3,1);
    }
    .intro-name .char.accent { color: #6274f2; }
    .intro-name .char.space { width: 0.32em; }
    .intro-name .char.show {
      opacity: 1;
      transform: translateY(0);
    }

    .intro-tagline {
      font-size: clamp(0.7rem, 2vw, 0.85rem);
      font-weight: 600;
      letter-spacing: 0.32em;
      text-transform: uppercase;
      color: #8a91a3;
      opacity: 0;
      transform: translateY(10px);
      transition: opacity 0.9s ease, transform 0.9s ease;
      margin-bottom: 60px;
    }
    .intro-tagline.show {
      opacity: 1;
      transform: translateY(0);
    }

    /* ─── PROGRESS BAR ─── */
    .intro-progress {
      position: fixed;
      bottom: 0; left: 0;
      height: 2px;
      width: 0%;
      background: linear-gradient(90deg, transparent, rgba(98,116,242,0.7), #6274f2, rgba(98,116,242,0.7), transparent);
      box-shadow: 0 0 8px rgba(98,116,242,0.4);
      z-index: 20;
      opacity: 0;
      transition: opacity 0.3s ease;
    }
    .intro-progress.active { opacity: 1; }

    /* shimmer removed — clean static ink + accent name */

    /* ─── SKIP BUTTON ─── */
    .intro-skip {
      position: fixed;
      bottom: 28px;
      right: 28px;
      z-index: 20;
      font-family: 'Instrument Sans', sans-serif;
      font-size: 0.75rem;
      font-weight: 600;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: #8a91a3;
      background: #ffffff;
      border: 1px solid #e6e9f3;
      border-radius: 20px;
      padding: 7px 16px;
      cursor: pointer;
      opacity: 0;
      box-shadow: 0 6px 22px rgba(46,52,64,0.07);
      transition: opacity 0.5s ease, color 0.2s, border-color 0.2s;
    }
    .intro-skip.show { opacity: 1; }
    .intro-skip:hover { color: #2e3440; border-color: #8a91a3; }

    /* ─── CINEMATIC LINES ─── */
    .cin-line {
      position: fixed;
      left: 0; right: 0;
      height: 80px;
      background: #eef0fe;
      z-index: 5;
      transition: transform 1.2s cubic-bezier(0.76,0,0.24,1);
    }
    .cin-line-top { top: 0; transform: translateY(0); }
    .cin-line-bot { bottom: 0; transform: translateY(0); }
    .cin-line-top.open { transform: translateY(-100%); }
    .cin-line-bot.open { transform: translateY(100%); }

    /* ─── FADE OUT OVERLAY ─── */
    .intro-fade {
      position: fixed;
      inset: 0;
      background: #ffffff;
      z-index: 50;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.8s ease;
    }
    .intro-fade.out { opacity: 1; }

    @media (max-width: 480px) {
      .intro-logo-wrap  { width: 100px; height: 100px; margin-bottom: 60px; }
      .intro-logo-img   { width: 100px; height: 100px; }
      .orbit-track      { inset: -26px; }
      .cin-line         { height: 60px; }
      .intro-name .char { font-size: clamp(0.9rem, 5.2vw, 1.4rem); letter-spacing: 0.05em; }
      .intro-tagline    { margin-bottom: 28px; font-size: 0.7rem; }
      .qt-cycle-wrap    { margin-bottom: 24px; }
      .qt-cycle-wrap svg { width: 170px; height: 72px; }
    }

    /* ─── MOBILE: smaller pills ─── */
    @media (max-width: 768px) {
      .intro-pill-1 { width: 96px; top: 5%;  left: -12px; }
      .intro-pill-2 { width: 92px; top: 6%;  right: -12px; }
      .intro-pill-3 { width: 140px; bottom: 3%; left: -24px; }
      .intro-pill-4 { width: 132px; bottom: 4%; right: -24px; }
    }
  </style>
</head>
<body>

  <!-- cinematic bars -->
  <div class="cin-line cin-line-top" id="cinTop"></div>
  <div class="cin-line cin-line-bot" id="cinBot"></div>

  <!-- light bg with floating pills -->
  <div class="intro-bg" id="introBg">
    <img src="images/backpill.png" alt="" aria-hidden="true" class="intro-pill intro-pill-1" />
    <img src="images/backpill 3.png" alt="" aria-hidden="true" class="intro-pill intro-pill-2" />
    <img src="images/backpill 2.png" alt="" aria-hidden="true" class="intro-pill intro-pill-3" />
    <img src="images/backpill.png" alt="" aria-hidden="true" class="intro-pill intro-pill-4" />
  </div>

  <!-- main stage -->
  <div class="intro-stage">
    <div class="intro-logo-wrap" id="introLogo">
      <div class="intro-logo-ring" id="logoRing"></div>
      <div class="orbit-track">
        <div class="orbit-dot orbit-dot-q1"></div>
        <div class="orbit-dot orbit-dot-q2"></div>
        <div class="orbit-dot orbit-dot-q3"></div>
        <div class="orbit-dot orbit-dot-q4"></div>
      </div>
      <img class="intro-logo-img" src="images/logo.png" alt="Kenpachi Trades"
           onerror="this.src='images/avatar.png'" />
    </div>

    <div class="intro-name" id="introName"></div>

    <div class="intro-tagline" id="introTagline">Quarterly Theory Education</div>

    <div class="qt-cycle-wrap" id="qtCycleWrap">
      <span class="intro-spinner" aria-hidden="true">&#127744;</span>
    </div>
  </div>

  <!-- progress bar -->
  <div class="intro-progress" id="introProgress"></div>

  <!-- skip -->
  <button class="intro-skip" id="introSkip">Skip →</button>

  <!-- fade overlay -->
  <div class="intro-fade" id="introFade"></div>

  <script>
    const DEST = 'qt-education.html';
    const TOTAL_MS = 4200;

    const logo     = document.getElementById('introLogo');
    const ring     = document.getElementById('logoRing');
    const nameEl   = document.getElementById('introName');
    const tagline  = document.getElementById('introTagline');
    const qtCycle  = document.getElementById('qtCycleWrap');
    const prog     = document.getElementById('introProgress');
    const skip     = document.getElementById('introSkip');
    const fade     = document.getElementById('introFade');
    const cinTop   = document.getElementById('cinTop');
    const cinBot   = document.getElementById('cinBot');

    function navigate() {
      fade.classList.add('out');
      setTimeout(() => { window.location.href = DEST; }, 820);
    }

    skip.addEventListener('click', navigate);

    // ── SEQUENCE ──────────────────────────────────────────────
    const name = 'Kenpachi Trades';

    // Build letter spans — second word gets the accent color
    let pastSpace = false;
    [...name].forEach(ch => {
      if (ch === ' ') pastSpace = true;
      const s = document.createElement('span');
      s.className = 'char' + (ch === ' ' ? ' space' : '') + (pastSpace && ch !== ' ' ? ' accent' : '');
      s.textContent = ch === ' ' ? ' ' : ch;
      nameEl.appendChild(s);
    });

    const chars = nameEl.querySelectorAll('.char');
    let progTimer = null;
    let startTime = null;

    function animateProgress() {
      startTime = Date.now();
      prog.classList.add('active');
      function tick() {
        const elapsed = Date.now() - startTime;
        const pct = Math.min(elapsed / TOTAL_MS * 100, 100);
        prog.style.width = pct + '%';
        if (pct < 100) progTimer = requestAnimationFrame(tick);
      }
      progTimer = requestAnimationFrame(tick);
    }

    setTimeout(() => {
      // Open cinematic bars
      cinTop.classList.add('open');
      cinBot.classList.add('open');
    }, 100);

    setTimeout(() => {
      // Logo appears
      logo.classList.add('show');
    }, 400);

    setTimeout(() => {
      // Ring glow
      ring.classList.add('glow');
    }, 900);

    setTimeout(() => {
      // Letters animate in staggered
      chars.forEach((c, i) => {
        setTimeout(() => c.classList.add('show'), i * 52);
      });
    }, 1200);

    setTimeout(() => {
      // Tagline + QT spiral
      tagline.classList.add('show');
      setTimeout(() => qtCycle.classList.add('show'), 300);
      // Show skip
      skip.classList.add('show');
      // Start progress
      animateProgress();
    }, 2000);

    setTimeout(navigate, TOTAL_MS + 200);
  </script>
</body>
